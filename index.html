<!DOCTYPE html>
<html>
<head>
<title>Polity MCQ Practice</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 420px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

button:hover:not(:disabled) {
    opacity: 0.9;
}

#status {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    font-weight: 500;
}

.progress-container {
    width: 100%;
    background: #eee;
    border-radius: 20px;
    margin-top: 10px;
    height: 10px;
    overflow: hidden;
    display: none;
}

.progress-bar {
    height: 10px;
    width: 0%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    transition: width 0.4s ease;
}

#result {
    margin-top: 15px;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="card">
    <h2>Polity MCQ Practice</h2>

    <form id="mcqForm">
        <label>Topic</label>
        <input type="text" id="topic" required>

        <label>Difficulty</label>
        <select id="difficulty" required>
            <option value="">Select Difficulty</option>
            <option value="Easy">Easy</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Hard">Hard</option>
        </select>

        <button id="generateBtn" type="submit">Generate MCQs</button>
    </form>

    <div id="status"></div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <pre id="result"></pre>
</div>

<script>
document.getElementById("mcqForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const topic = document.getElementById("topic").value;
    const difficulty = document.getElementById("difficulty").value;
    const button = document.getElementById("generateBtn");
    const status = document.getElementById("status");
    const progressBar = document.getElementById("progressBar");
    const progressContainer = document.getElementById("progressContainer");

    button.disabled = true;
    progressContainer.style.display = "block";
    progressBar.style.width = "0%";
    document.getElementById("result").innerText = "";

    try {
        status.innerText = "Analysing PYQs...";
        progressBar.style.width = "30%";

        await new Promise(r => setTimeout(r, 800));

        status.innerText = "Generating questions...";
        progressBar.style.width = "60%";

        const response = await fetch("https://hook.eu2.make.com/fraqljwaynxax2boxy79qbhina47ako5", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                topic: topic,
                difficulty: difficulty
            })
        });

        status.innerText = "Finalizing output...";
        progressBar.style.width = "85%";

        const data = await response.text();

        progressBar.style.width = "100%";
        status.innerText = "Generation Complete";

        document.getElementById("result").innerText = data;

    } catch (error) {
        status.innerText = "Error generating questions.";
    }

    button.disabled = false;
});
</script>

</body>
</html>
