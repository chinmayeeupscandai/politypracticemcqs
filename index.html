<!DOCTYPE html>
<html>
<head>
<title>Polity MCQ Practice</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 420px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

#status {
    text-align: center;
    margin-top: 10px;
    font-weight: 500;
}

.progress-container {
    width: 100%;
    background: #eee;
    border-radius: 20px;
    margin-top: 10px;
    height: 10px;
    overflow: hidden;
    display: none;
}

.progress-bar {
    height: 10px;
    width: 0%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    transition: width 0.4s ease;
}

#result {
    margin-top: 15px;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="card" id="portal" style="display:none;">
    <h2>Polity MCQ Practice</h2>

    <form id="mcqForm">
        <label>Topic</label>
        <input type="text" id="topic" required>

        <label>Difficulty</label>
        <select id="difficulty" required>
            <option value="">Select Difficulty</option>
            <option value="Easy">Easy</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Hard">Hard</option>
        </select>

        <button id="generateBtn" type="submit">Generate MCQs</button>
    </form>

    <div id="status"></div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <pre id="result"></pre>
</div>

<script>

// Payment Check Logic
const urlParams = new URLSearchParams(window.location.search);

// If redirected after successful payment
if (urlParams.get('payment_status') === 'success') {
    localStorage.setItem("mcqPaid", "yes");
    window.location.href = window.location.origin + window.location.pathname;
}

// If not paid, redirect to Cashfree
if (localStorage.getItem("mcqPaid") !== "yes") {
    window.location.href = "https://payments.cashfree.com/forms?code=polity";
} else {
    document.getElementById("portal").style.display = "block";
}

// MCQ Generation
document.getElementById("mcqForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const topic = document.getElementById("topic").value;
    const difficulty = document.getElementById("difficulty").value;
    const button = document.getElementById("generateBtn");
    const status = document.getElementById("status");
    const progressBar = document.getElementById("progressBar");
    const progressContainer = document.getElementById("progressContainer");

    button.disabled = true;
    progressContainer.style.display = "block";
    progressBar.style.width = "30%";
    status.innerText = "Analysing PYQs...";

    await new Promise(r => setTimeout(r, 800));

    progressBar.style.width = "60%";
    status.innerText = "Generating questions...";

    const response = await fetch("https://hook.eu2.make.com/fraqljwaynxax2boxy79qbhina47ako5", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic, difficulty })
    });

    progressBar.style.width = "85%";
    status.innerText = "Finalizing output...";

    const data = await response.text();

    progressBar.style.width = "100%";
    status.innerText = "Generation Complete";

    document.getElementById("result").innerText = data;
    button.disabled = false;
});
</script>

</body>
</html>
